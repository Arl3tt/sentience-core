name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_sandbox_tests:
        description: 'Set to true to run sandbox integration tests (requires Docker + Redis).'
        required: false
        default: 'false'

jobs:
  lint:
    name: Lint Code (Flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 linting
        run: |
            flake8 . --max-line-length=120 \
            --exclude=.venv,.git,__pycache__,.pytest_cache,htmlcov,docs,models,data,tests,sentence_transformers,sklearn,redis

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run validation (import verification)
        run: python test_bci_imports.py

      - name: Run pytest tests
        run: |
          pytest tests/ -v --cov=core --cov=memory --cov-report=html --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install security tools
        run: pip install bandit

      - name: Run security check
        run: |
          bandit -r core memory models data --exclude=tests -f json -o bandit-report.json || true
          echo "Security check completed. See bandit-report.json for details."

  sandbox_integration:
    name: Sandbox Integration Tests (optional)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_sandbox_tests == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sandbox integration tests
        run: |
          pytest core/tools/test_sandbox_queue.py -v

  profile:
    name: Run Profiling
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run profiling
        run: python scripts/profile_bci_modules.py 2>&1 | tee profiling.log
        continue-on-error: true

      - name: Upload profiling artifact
        uses: actions/upload-artifact@v4
        with:
          name: bci-profiling
          path: profiling.json
