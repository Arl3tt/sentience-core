name: CI

on:
    push:
    pull_request:

jobs:
    lint-and-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.9"
            - name: Install test dependencies
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install numpy scipy pytest pytest-cov flake8 requests -q
            - name: Validate syntax (compile all .py files)
              run: |
                  python -m py_compile $(git ls-files '*.py')
            - name: Run import verification
              run: |
                  python test_bci_imports.py
            - name: Lint (flake8)
              run: |
                  flake8 . --max-line-length=120
            - name: Run tests with coverage
              run: |
                  pytest -q tests --cov=core/tools --cov-report=html --cov-report=term-missing
            - name: Run profiling and save JSON
              run: |
                  python scripts/profile_bci_modules.py > profiling.json
            - name: Upload profiling artifact
              uses: actions/upload-artifact@v4
              with:
                  name: bci-profiling
                  path: profiling.json
            - name: Upload coverage report
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: htmlcov/
